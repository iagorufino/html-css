<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /* Box-Level */
            background-color: lightgrey;
            /* Size(tamanho) da Caixa */
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;
            border: 10px solid darkslategray; /* Shorthand */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            padding: 10px; /* Pode ser feito com 4 px mas com 1px ele usa para os 4 cantos */
        }

        a { /* Inline-Level */
            border-width: 10px;
            border-style: solid;
            border-color: lightcoral;
            border: 10px solid lightcoral; /* Shorthand */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding: 10px; /* Shorthand */
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level.</a> Vamos ver como tudo isso funciona.</p>
    <img src="5.avif" alt="foto" class="foto">
</body>
</html>
