<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face { /* font-face é para adicionar uma fonte instalada e nova  */
            font-family: 'Love';  /* Nome dado para a fonte */
            src: url('fonts/love story.ttf') format('truetype'), /* url é onde está na pasta / format é o detalhe do arquivo */
            url('fonts/love story.otf') format('opentype');

            /*
            Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: Love;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sed dolorum quia, dolor veniam recusandae quae doloribus, velit ipsum perferendis enim esse qui omnis, unde ut perspiciatis minima eius labore mollitia.</p>
</body>
</html>
