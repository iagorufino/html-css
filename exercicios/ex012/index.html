<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video width="560" poster="imagem/pexels-markusspiske-1921326.jpg" controls> <!-- Poster é a imagem que será a "thumb" do vídeo / controls é para ativar o atalho de "play" no vídeo / width é a largura -->
        <source src="midia/code-webm.webm" type="video/webm">
        <source src="midia/code-mp4.mp4" type="video/mp4">
        <source src="midia/code-ogv.ogv" type="video/ogg">
        <source src="midia/code-m4v.mp4" type="video/mp4"> <!-- Bom colocar mais de um tipo de arquivo para que exista compatibilidade com todos os navegadores -->
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video> <!-- Não recomendado colocar vídeos no site dessa forma, além de ficar pesado com quantidades de pessoas usando, existe formas melhores -->
    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/MtSNNbUhyAU?si=9AugQ3M8Rgtz7Gls" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>Inserindo vídeos do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/153187817?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="2016 Animation Reel"></iframe> <!-- Ir em Incorporar e copiar o code -->
</body>
</html>
