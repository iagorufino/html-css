<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiante em Css</title>
    <style>
        *{ /* Configurações Globais da CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to right, #E05CAE, #B66998, #8B687E, #70646B, #38212F);
            /* background-image é Para fazer Degradês, linear gradient "to right ou para outros lados é a direção" */
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiante</h1>
    
</body>
</html>
